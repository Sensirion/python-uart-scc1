name: Build and Publish Package to pypi.org
on:
  push:
    tags:
        - "[0-9]+.[0-9]+.[0-9]+"

jobs:
    build:
      runs-on: ubuntu-24.04
      steps:
            - uses: actions/checkout@v7.0.0
            - uses: actions/setup-python@v6.3.0
              with:
                python-version: '3.11'
            - name: Install Poetry
              uses: abatilo/actions-poetry@v4.0.0
              with:
                poetry-version: 1.7.1
            - uses: actions/cache@v6.1.0
              name: Define a cache for the virtual environment based on the dependencies lock file
              with:
                path: ./.venv
                key: venv-${{ hashFiles('poetry.lock') }}
            - name: Install the project dependencies
              run: poetry install
            - name: Build Packages
              run: poetry install
            - name: Build Python packages
              run: poetry build
            - name: Store the distribution packages
              uses: actions/upload-artifact@v7.0.1
              with:
                name: python-package-distributions
                path: dist/
    publish-pypi:
        environment:
            name: release
            url: https://pypi.org/p/sensirion-uart-scc1
        permissions:
            id-token: write
        runs-on: ubuntu-24.04
        needs:
          - build
        steps:
            - name: Download artifacts
              uses: actions/download-artifact@v8.0.1
              with:
                name: python-package-distributions
                path: dist/
            - name: Publish package distributions to PyPI
              uses: pypa/gh-action-pypi-publish@v1.14.0
    github-release:
      name: Sign Python distribution and upload it as GitHub Release
      needs:
        - build
        - publish-pypi
      runs-on: ubuntu-latest
      permissions:
        actions: read
        contents: write
        id-token: write
      steps:
        - name: Download artifacts
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: >-
            gh run download
            '${{ github.run_id }}'
            --name python-package-distributions
            --dir dist/
            --repo '${{ github.repository }}'
        - name: Install sigstore-python
          run: python3 -m pip install --upgrade sigstore
        - name: Sign the dists with Sigstore
          shell: bash
          run: |
            shopt -s nullglob
            files=(./dist/*.tar.gz ./dist/*.whl)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "No distribution artifacts found in ./dist/"
              exit 1
            fi
            echo "Found ${#files[@]} distribution artifacts to sign."
            for file in "${files[@]}"; do
              echo "Signing ${file}"
              python3 -m sigstore sign "${file}"
            done
        - name: Create GitHub Release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: >-
            gh release create
            '${{ github.ref_name }}'
            --repo '${{ github.repository }}'
            --notes ""
        - name: Upload artifact signatures to GitHub Release
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Upload to GitHub Release using the `gh` CLI.
          # `dist/` contains the built packages, and the
          # sigstore-produced signatures and certificates.
          run: >-
            gh release upload
            '${{ github.ref_name }}' dist/**
            --repo '${{ github.repository }}'
